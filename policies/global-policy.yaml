# global-policy.yaml
# 全局安全策略：不乱删文件、不乱发帖、基础防护
version: "1"
scope: global
defaultEffect: allow   # 全局默认放行，通过 deny 规则精确拦截

rules:
  # ── 文件保护 ──────────────────────────────────────────────
  - id: deny-delete-file
    priority: 1
    match:
      action: "delete:file"
    effect: deny
    reason: "禁止删除文件，如需删除请联系管理员"

  - id: deny-delete-all
    priority: 1
    match:
      action: "delete:*"
    effect: deny
    reason: "禁止任何删除操作"

  - id: deny-shell-rm
    priority: 1
    match:
      action: "execute:shell"
      params:
        command: "rm *"
    effect: deny
    reason: "禁止通过 shell 执行删除命令"

  # ── 系统操作防护 ──────────────────────────────────────────
  - id: deny-shell
    priority: 2
    match:
      action: "execute:shell"
    effect: deny
    reason: "禁止执行 shell 命令"

  # ── 发帖/消息发送控制（由代理级策略细化） ─────────────────
  - id: allow-read
    priority: 10
    match:
      action: "read:*"
    effect: allow

  - id: allow-write-file
    priority: 10
    match:
      action: "write:file"
    effect: allow

# 域名白名单：只允许访问已知安全域名
domainFilter:
  mode: whitelist
  list:
    - "*.company.com"
    - "api.openai.com"
    - "api.anthropic.com"
    - "*.trusted.com"

# 时间窗口：凌晨禁止所有写操作（防止异常时段操作）
timeRestrictions:
  - id: block-write-midnight
    action: "write:*"
    effect: deny
    schedule:
      type: daily_block
      start: "00:00"
      end: "06:00"
      timezone: "Asia/Shanghai"
