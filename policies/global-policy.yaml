# global-policy.yaml
# Global security policy: no file deletion, no unauthorized posting, baseline protection
version: "1"
scope: global
defaultEffect: allow   # allow by default; use deny rules for precise blocking

rules:
  # ── File protection ───────────────────────────────────────────
  - id: deny-delete-file
    priority: 1
    match:
      action: "delete:file"
    effect: deny
    reason: "File deletion is not allowed; contact an admin if needed"

  - id: deny-delete-all
    priority: 1
    match:
      action: "delete:*"
    effect: deny
    reason: "All delete operations are blocked"

  - id: deny-shell-rm
    priority: 1
    match:
      action: "execute:shell"
      params:
        command: "rm *"
    effect: deny
    reason: "Shell delete commands are not allowed"

  # ── System operation protection ───────────────────────────────
  - id: deny-shell
    priority: 2
    match:
      action: "execute:shell"
    effect: deny
    reason: "Shell execution is not allowed"

  # ── Read/write allow rules (refined by agent-level policies) ──
  - id: allow-read
    priority: 10
    match:
      action: "read:*"
    effect: allow

  - id: allow-write-file
    priority: 10
    match:
      action: "write:file"
    effect: allow

# Domain whitelist: only allow access to known safe domains
domainFilter:
  mode: whitelist
  list:
    - "*.company.com"
    - "api.openai.com"
    - "api.anthropic.com"
    - "*.trusted.com"

# Time window: block all write operations during off-hours (00:00-06:00)
timeRestrictions:
  - id: block-write-midnight
    action: "write:*"
    effect: deny
    schedule:
      type: daily_block
      start: "00:00"
      end: "06:00"
      timezone: "Asia/Shanghai"
