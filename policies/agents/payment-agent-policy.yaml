# agents/payment-agent-policy.yaml
# Payment agent policy: set spending limits, free use within limits
version: "1"
scope: agent
target: "payment-agent"
defaultEffect: allow   # allow all within limits

rules:
  # Allow all payment-related operations (limits enforced by budget)
  - id: allow-payment
    priority: 10
    match:
      action: "call:payment-api"
    effect: allow

  - id: allow-transfer
    priority: 10
    match:
      action: "call:transfer-api"
    effect: allow

# ── Spending limits (auto-block when exceeded) ────────────────
budget:
  daily:
    moneyCny: 500       # daily limit: 500 CNY — free use within limit
    calls: 200          # daily call limit: 200
  monthly:
    moneyCny: 5000      # monthly limit: 5000 CNY
  singleOp:
    moneyCny: 1000      # per-transaction limit: 1000 CNY

# ── Rate limits (prevent burst usage from exhausting budget) ──
rateLimits:
  - action: "call:payment-api"
    window: 1m
    maxCount: 10        # max 10 payments/min — sustained use within limit is fine
  - action: "call:transfer-api"
    window: 1m
    maxCount: 5

# ── Time window: block payments during off-hours ──────────────
timeRestrictions:
  - id: block-payment-night
    action: "call:*"
    effect: deny
    schedule:
      type: daily_block
      start: "00:00"
      end: "06:00"
      timezone: "Asia/Shanghai"
