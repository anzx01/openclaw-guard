# agents/payment-agent-policy.yaml
# 支付/花费代理策略：设定花费上限，限额内随便调用
version: "1"
scope: agent
target: "payment-agent"
defaultEffect: allow   # 限额内全部放行

rules:
  # 允许所有支付相关操作（限额由 budget 控制）
  - id: allow-payment
    priority: 10
    match:
      action: "call:payment-api"
    effect: allow

  - id: allow-transfer
    priority: 10
    match:
      action: "call:transfer-api"
    effect: allow

# ── 花费上限（超出则自动阻断）────────────────────────────────
budget:
  daily:
    moneyCny: 500       # 每日上限 500 元，限额内随便花
    calls: 200          # 每日调用次数上限
  monthly:
    moneyCny: 5000      # 每月上限 5000 元
  singleOp:
    moneyCny: 1000      # 单笔上限 1000 元

# ── 频率限制（防止短时间内爆发式调用耗尽限额）────────────────
rateLimits:
  - action: "call:payment-api"
    window: 1m
    maxCount: 10        # 每分钟最多 10 笔，限额内可持续调用
  - action: "call:transfer-api"
    window: 1m
    maxCount: 5

# ── 时间窗口：凌晨禁止支付（异常时段保护）────────────────────
timeRestrictions:
  - id: block-payment-night
    action: "call:*"
    effect: deny
    schedule:
      type: daily_block
      start: "00:00"
      end: "06:00"
      timezone: "Asia/Shanghai"

