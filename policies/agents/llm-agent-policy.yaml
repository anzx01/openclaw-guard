# agents/llm-agent-policy.yaml
# 大模型调用代理策略：设定花费上限，限额内随便调用
version: "1"
scope: agent
target: "llm-agent"
defaultEffect: allow   # 限额内全部放行

rules:
  # 允许所有模型调用（限额由 budget 控制，不限制模型种类）
  - id: allow-llm-calls
    priority: 10
    match:
      action: "call:llm"
    effect: allow

# ── 花费上限（超出则自动阻断）────────────────────────────────
budget:
  daily:
    tokens: 1000000     # 每日 token 上限：100 万（约 $3-5，视模型而定）
    calls: 500          # 每日调用次数上限：500 次
  monthly:
    tokens: 20000000    # 每月 token 上限：2000 万
    calls: 10000        # 每月调用次数上限：1 万次
  singleOp:
    tokens: 100000      # 单次请求 token 上限：10 万（防止单次超长上下文）

# ── 频率限制（防止短时间内爆发式调用耗尽限额）────────────────
rateLimits:
  - action: "call:llm"
    window: 1m
    maxCount: 30        # 每分钟最多 30 次（限额内可持续调用）
  - action: "call:llm"
    window: 1h
    maxCount: 300       # 每小时最多 300 次

# ── 说明 ──────────────────────────────────────────────────────
# 1. 不限制模型种类，GPT-4o / Claude Opus / Gemini 均可使用
# 2. token 消耗由调用方在 params.tokens 中上报，或由插件从响应中读取
# 3. 超出 daily/monthly 上限后，当天/当月剩余请求全部被阻断
# 4. 次日/次月自动重置（Redis TTL 自动过期）
# 5. 剩余预算 < 20% 时触发 WARNING 告警，耗尽时触发 CRITICAL 告警
