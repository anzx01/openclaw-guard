# agents/llm-agent-policy.yaml
# LLM agent policy: set spending limits, free use within limits
version: "1"
scope: agent
target: "llm-agent"
defaultEffect: allow   # allow all within limits

rules:
  # Allow all LLM calls (limits enforced by budget, no model restrictions)
  - id: allow-llm-calls
    priority: 10
    match:
      action: "call:llm"
    effect: allow

# ── Spending limits (auto-block when exceeded) ────────────────
budget:
  daily:
    tokens: 1000000     # daily token limit: 1M (approx $3-5 depending on model)
    calls: 500          # daily call limit: 500
  monthly:
    tokens: 20000000    # monthly token limit: 20M
    calls: 10000        # monthly call limit: 10K
  singleOp:
    tokens: 100000      # per-request token limit: 100K (prevents runaway context)

# ── Rate limits (prevent burst usage from exhausting budget) ──
rateLimits:
  - action: "call:llm"
    window: 1m
    maxCount: 30        # max 30 calls/min (sustained use within limit is fine)
  - action: "call:llm"
    window: 1h
    maxCount: 300       # max 300 calls/hour

# ── Notes ─────────────────────────────────────────────────────
# 1. No model restrictions — GPT-4o / Claude Opus / Gemini all allowed
# 2. Token usage reported by caller via params.tokens, or read from response
# 3. Once daily/monthly limit is hit, all remaining requests are blocked
# 4. Resets automatically next day/month (Redis TTL auto-expiry)
# 5. WARNING alert at <20% remaining; CRITICAL alert when exhausted
