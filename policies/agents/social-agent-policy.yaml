# agents/social-agent-policy.yaml
# 社交/发帖代理策略：防止乱发帖
version: "1"
scope: agent
target: "social-agent"
defaultEffect: allow

rules:
  # 禁止直接发布到社交媒体（需人工审批）
  - id: deny-auto-publish
    priority: 1
    match:
      action: "call:twitter-api"
      params:
        method: "POST"
    effect: deny
    reason: "禁止自动发推，所有发帖需人工确认"

  - id: deny-weibo-post
    priority: 1
    match:
      action: "call:weibo-api"
      params:
        method: "POST"
    effect: deny
    reason: "禁止自动发微博"

  - id: deny-mass-email
    priority: 1
    match:
      action: "send:email"
    effect: deny
    reason: "禁止自动发送邮件，请通过审批流程"

  # 允许读取/查询操作
  - id: allow-social-read
    priority: 10
    match:
      action: "call:*-api"
      params:
        method: "GET"
    effect: allow

# 频率限制：即使允许的操作也要限速
rateLimits:
  - action: "call:*"
    window: 1m
    maxCount: 10      # 每分钟最多 10 次 API 调用
  - action: "call:*"
    window: 1h
    maxCount: 100     # 每小时最多 100 次
