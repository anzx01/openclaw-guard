# agents/social-agent-policy.yaml
# Social/posting agent policy: prevent unauthorized posting
version: "1"
scope: agent
target: "social-agent"
defaultEffect: allow

rules:
  # Block direct publishing to social media (requires human approval)
  - id: deny-auto-publish
    priority: 1
    match:
      action: "call:twitter-api"
      params:
        method: "POST"
    effect: deny
    reason: "Auto-posting to Twitter is disabled; all posts require human approval"

  - id: deny-weibo-post
    priority: 1
    match:
      action: "call:weibo-api"
      params:
        method: "POST"
    effect: deny
    reason: "Auto-posting to Weibo is disabled"

  - id: deny-mass-email
    priority: 1
    match:
      action: "send:email"
    effect: deny
    reason: "Automated email sending is disabled; use the approval workflow"

  # Allow read/query operations
  - id: allow-social-read
    priority: 10
    match:
      action: "call:*-api"
      params:
        method: "GET"
    effect: allow

# Rate limits: throttle even allowed operations
rateLimits:
  - action: "call:*"
    window: 1m
    maxCount: 10      # max 10 API calls/min
  - action: "call:*"
    window: 1h
    maxCount: 100     # max 100 API calls/hour
